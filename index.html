<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preload" as="image" href="promo1.jpg">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

video, img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

/* Menu video */
video {
    object-fit: contain;
    opacity: 1;
    z-index: 2;
}

/* Promotion image */
img {
    object-fit: cover;
    opacity: 0;
    z-index: 1;
}
</style>

</head>

<body>

<video id="menuVideo" muted playsinline preload="auto">
    <source src="wrap-vertical1-lg.mp4" type="video/mp4">
</video>

<img id="promoImage" src="promo1.jpg" alt="Promotion">


<script>

const video = document.getElementById("menuVideo");
const image = document.getElementById("promoImage");
const params = new URLSearchParams(window.location.search);

// Image display time (milliseconds)
const imageDuration = 8000;


function startVideo() {

    // Hide image, show video
    image.style.opacity = "0";
    video.style.opacity = "1";

    video.currentTime = 0;

    const promise = video.play();

    if (promise !== undefined) {
        promise.catch(() => {

            setTimeout(() => {
                video.play().catch(() => {});
            }, 1000);

        });
    }
}


function showImage() {

    // Hide video, show image
    video.pause();

    video.style.opacity = "0";
    image.style.opacity = "1";


    setTimeout(() => {
        startVideo();
    }, imageDuration);

}


// When video finishes
video.addEventListener("ended", showImage);



if (params.get("compat") === "1") {

    video.autoplay = false;
    video.load();


    window.onload = function () {
        startVideo();
    };


    document.addEventListener("visibilitychange", function () {

        if (!document.hidden) {
            startVideo();
        }

    });


} else {


    window.onload = function () {
        startVideo();
    };


}

</script>


</body>
</html>
